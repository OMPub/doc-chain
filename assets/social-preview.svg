<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Doc Chain social preview</title>
  <desc id="desc">Linked document icons floating in space beside the Doc Chain project name.</desc>
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0d1f25"/>
    </linearGradient>
    <radialGradient id="galaxy" cx="46%" cy="42%" r="58%">
      <stop offset="0" stop-color="#b7f7ff" stop-opacity="0.16"/>
      <stop offset="0.38" stop-color="#7dd3fc" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <style>
      .title {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 92px;
        font-weight: 760;
        letter-spacing: 0;
        fill: #f8fafc;
      }
      .subtitle {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 31px;
        font-weight: 500;
        letter-spacing: 0;
        fill: #b7c7d6;
      }
      .eyebrow {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
        fill: #67e8f9;
      }
      .document {
        fill: #f8fafc;
        stroke: #dbeafe;
        stroke-width: 4;
      }
      .fold {
        fill: #bfdbfe;
        stroke: #93c5fd;
        stroke-width: 3;
      }
      .doc-line {
        stroke: #64748b;
        stroke-width: 5;
        stroke-linecap: round;
      }
      .link {
        fill: none;
        stroke-linecap: round;
        stroke-width: 13;
      }
      .link-back {
        stroke: #0f172a;
      }
      .link-front {
        stroke: #22d3ee;
      }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#space)"/>
  <rect width="1280" height="640" fill="url(#galaxy)"/>

  <g opacity="0.9">
    <circle cx="86" cy="78" r="2.2" fill="#e0f2fe"/>
    <circle cx="144" cy="211" r="1.6" fill="#bae6fd"/>
    <circle cx="221" cy="122" r="2.4" fill="#fef3c7"/>
    <circle cx="345" cy="80" r="1.8" fill="#d1fae5"/>
    <circle cx="402" cy="550" r="1.7" fill="#e0f2fe"/>
    <circle cx="526" cy="102" r="2.1" fill="#f8fafc"/>
    <circle cx="679" cy="58" r="1.6" fill="#bae6fd"/>
    <circle cx="759" cy="522" r="2.4" fill="#fef3c7"/>
    <circle cx="874" cy="84" r="1.8" fill="#d1fae5"/>
    <circle cx="1010" cy="153" r="2.5" fill="#e0f2fe"/>
    <circle cx="1128" cy="63" r="1.7" fill="#f8fafc"/>
    <circle cx="1196" cy="478" r="2.2" fill="#bae6fd"/>
    <circle cx="1150" cy="556" r="1.5" fill="#fef3c7"/>
    <circle cx="945" cy="574" r="1.5" fill="#d1fae5"/>
    <circle cx="294" cy="481" r="1.8" fill="#bae6fd"/>
  </g>

  <g transform="translate(890 378) rotate(-15)" opacity="0.72">
    <circle cx="0" cy="0" r="58" fill="#f97316"/>
    <circle cx="-22" cy="-18" r="56" fill="#fb923c" opacity="0.42"/>
    <ellipse cx="0" cy="0" rx="104" ry="24" fill="none" stroke="#fef3c7" stroke-width="5" opacity="0.75"/>
  </g>

  <g transform="translate(86 136)" filter="url(#shadow)">
    <path class="link link-back" d="M154 156 C192 124 242 124 280 156"/>
    <path class="link link-front" d="M154 156 C192 124 242 124 280 156" stroke-dasharray="56 20"/>
    <path class="link link-back" d="M398 156 C436 124 486 124 524 156"/>
    <path class="link link-front" d="M398 156 C436 124 486 124 524 156" stroke-dasharray="56 20"/>

    <g transform="rotate(-6 94 138)">
      <rect class="document" x="0" y="0" width="156" height="192" rx="10"/>
      <path class="fold" d="M112 0 L156 44 L112 44 Z"/>
      <path class="doc-line" d="M34 78 H118"/>
      <path class="doc-line" d="M34 110 H102"/>
      <path class="doc-line" d="M34 142 H126"/>
    </g>

    <g transform="translate(246 4) rotate(3 94 138)">
      <rect class="document" x="0" y="0" width="156" height="192" rx="10"/>
      <path class="fold" d="M112 0 L156 44 L112 44 Z"/>
      <path class="doc-line" d="M34 78 H118"/>
      <path class="doc-line" d="M34 110 H92"/>
      <path class="doc-line" d="M34 142 H126"/>
    </g>

    <g transform="translate(490 -2) rotate(-4 94 138)">
      <rect class="document" x="0" y="0" width="156" height="192" rx="10"/>
      <path class="fold" d="M112 0 L156 44 L112 44 Z"/>
      <path class="doc-line" d="M34 78 H118"/>
      <path class="doc-line" d="M34 110 H104"/>
      <path class="doc-line" d="M34 142 H126"/>
    </g>
  </g>

  <g transform="translate(92 112)" filter="url(#soft-glow)">
    <text class="eyebrow" x="0" y="0">EIP-712 ATTESTATION PROTOCOL</text>
  </g>
  <text class="title" x="88" y="418">Doc Chain</text>
  <text class="subtitle" x="94" y="470">Append-only Ethereum witness log for signed docs</text>

  <path d="M93 514 H480" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M502 514 H616" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
</svg>
