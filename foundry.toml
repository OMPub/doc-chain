[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "out"
cache_path = "cache"
solc_version = "0.8.35"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
libs = []

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
hoodi = "${HOODI_RPC_URL}"
